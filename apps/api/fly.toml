# fly.toml app configuration file generated for orbital-markets-funding on 2026-06-15T14:14:40+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'orbital-markets-funding'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  wait_timeout = '5m0s'

[env]
  ADDR = ':8080'
  DB_PATH = '/data/orbital.db'
  ENV = 'production'

[[mounts]]
  source = 'orbital_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

  [[services.http_checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '10s'
    method = 'get'
    path = '/api/v1/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
