name: Deploy Gate Worker

on:
  push:
    branches: [master]
    paths:
      - 'apps/gate-worker/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-worker.yml'
    tags:
      - 'v*'
      - 'worker-v*'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install root deps (wrangler)
        run: pnpm install --frozen-lockfile

      - name: Materialize wrangler config with real KV id
        working-directory: apps/gate-worker
        # The committed wrangler.toml has a placeholder; here we write the
        # gitignored wrangler.local.toml using the BETA_INVITES_KV_ID secret.
        run: |
          cat > wrangler.local.toml <<EOF
          name = "orbital-gate"
          main = "src/index.ts"
          compatibility_date = "2024-12-01"
          workers_dev = false

          [[kv_namespaces]]
          binding = "BETA_INVITES"
          id = "${BETA_INVITES_KV_ID}"
          EOF
        env:
          BETA_INVITES_KV_ID: ${{ secrets.BETA_INVITES_KV_ID }}

      - name: Typecheck
        working-directory: apps/gate-worker
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck

      - name: Deploy
        working-directory: apps/gate-worker
        run: ../../node_modules/.bin/wrangler deploy --config wrangler.local.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
